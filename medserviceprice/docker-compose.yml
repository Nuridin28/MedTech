services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msp_password}
      POSTGRES_DB: ${POSTGRES_DB:-medserviceprice}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msp} -d ${POSTGRES_DB:-medserviceprice}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploaddata:/app/data       # shared with worker: uploaded price files
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - uploaddata:/app/data       # reads files the backend wrote
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
    depends_on:
      worker:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploaddata:
