name: CI

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: medserviceprice

jobs:
  backend-tests:
    name: backend · pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps (with test tooling)
        working-directory: medserviceprice/backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run tests
        working-directory: medserviceprice/backend
        run: pytest

  frontend-build:
    name: frontend · typecheck + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: medserviceprice/frontend/package-lock.json
      - name: Install
        working-directory: medserviceprice/frontend
        run: npm ci
      - name: Build (tsc + vite)
        working-directory: medserviceprice/frontend
        run: npm run build
