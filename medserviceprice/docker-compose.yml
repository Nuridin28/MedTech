services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-msp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-msp_password}
      POSTGRES_DB: ${POSTGRES_DB:-medserviceprice}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-msp} -d ${POSTGRES_DB:-medserviceprice}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # --- ELK: log storage + exploration (dev single-node, security off) ---
  # Optional: only starts with `docker compose --profile elk up`. Off by default
  # to keep the stack light (ES+Kibana ~2-3GB RAM/disk). To use it, also set
  # ELASTIC_ENABLED=true in .env so backend/worker/beat ship their JSON logs.
  elasticsearch:
    profiles: ["elk"]
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"   # keep RAM modest for laptops
      bootstrap.memory_lock: "true"
    ulimits:
      memlock: { soft: -1, hard: -1 }
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  kibana:
    profiles: ["elk"]
    image: docker.elastic.co/kibana/kibana:8.15.1
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      ELASTIC_ENABLED: "${ELASTIC_ENABLED:-false}"
      ELASTICSEARCH_URL: http://elasticsearch:9200
      KIBANA_URL: http://localhost:5601
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - uploaddata:/app/data       # shared with worker: uploaded price files
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.celery_app.celery_app worker --loglevel=info --concurrency=2
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      ELASTIC_ENABLED: "${ELASTIC_ENABLED:-false}"
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - uploaddata:/app/data       # reads files the backend wrote
    restart: unless-stopped

  beat:
    build: ./backend
    command: celery -A app.celery_app.celery_app beat --loglevel=info
    env_file: .env
    environment:
      POSTGRES_HOST: db
      REDIS_HOST: redis
      ELASTIC_ENABLED: "${ELASTIC_ENABLED:-false}"
      ELASTICSEARCH_URL: http://elasticsearch:9200
    depends_on:
      worker:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  uploaddata:
  esdata:
